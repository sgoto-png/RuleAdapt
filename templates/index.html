<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RuleAdapt - 就業規則アジャストツール</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      background: #f4f6f9;
      color: #2c2c2c;
      min-height: 100vh;
    }

    header {
      background: #1a3a5c;
      color: white;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; }
    header span { font-size: 0.85rem; opacity: 0.8; }

    .container {
      max-width: 960px;
      margin: 32px auto;
      padding: 0 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 24px;
    }
    .card.full-width { grid-column: 1 / -1; }

    .card h2 {
      font-size: 1rem;
      font-weight: 700;
      color: #1a3a5c;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid #e8edf3;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"],
    textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d0d7e0;
      border-radius: 6px;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus { border-color: #1a3a5c; }
    textarea { resize: vertical; min-height: 120px; }

    .file-drop {
      border: 2px dashed #c0cad6;
      border-radius: 8px;
      padding: 28px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      color: #888;
    }
    .file-drop:hover, .file-drop.drag-over {
      border-color: #1a3a5c;
      background: #f0f5ff;
      color: #1a3a5c;
    }
    .file-drop input[type="file"] { display: none; }
    .file-drop .icon { font-size: 2rem; margin-bottom: 8px; }
    .file-drop .hint { font-size: 0.8rem; margin-top: 4px; }
    .file-name {
      margin-top: 8px;
      font-size: 0.85rem;
      color: #1a3a5c;
      font-weight: 600;
    }

    .divider {
      text-align: center;
      color: #aaa;
      font-size: 0.8rem;
      margin: 12px 0;
    }

    .btn-analyze {
      grid-column: 1 / -1;
      display: block;
      width: 100%;
      padding: 14px;
      background: #1a3a5c;
      color: white;
      font-size: 1.05rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-analyze:hover { background: #245080; }
    .btn-analyze:disabled { background: #9ab0c8; cursor: not-allowed; }

    #result-section { display: none; }
    #result-section.visible { display: block; }

    .result-box {
      background: #f8fafc;
      border: 1px solid #dde4ec;
      border-radius: 8px;
      padding: 20px;
      font-size: 0.9rem;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Markdown-like rendering */
    .result-box h3 {
      font-size: 1rem;
      color: #1a3a5c;
      margin: 16px 0 8px;
      border-left: 4px solid #1a3a5c;
      padding-left: 10px;
    }
    .result-box p { margin-bottom: 8px; }

    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .badge-red { background: #fde8e8; color: #c53030; }
    .badge-yellow { background: #fef9c3; color: #92400e; }
    .badge-green { background: #dcfce7; color: #166534; }

    .loading {
      display: none;
      text-align: center;
      padding: 32px;
      color: #555;
    }
    .loading.visible { display: block; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #e0e7ef;
      border-top-color: #1a3a5c;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: #fde8e8;
      color: #c53030;
      border-radius: 8px;
      padding: 14px;
      font-size: 0.9rem;
      display: none;
    }
    .error-msg.visible { display: block; }

    .copy-btn {
      float: right;
      padding: 6px 14px;
      background: #e8edf3;
      border: none;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      margin-top: -4px;
    }
    .copy-btn:hover { background: #d0d8e4; }

    @media (max-width: 640px) {
      .container { grid-template-columns: 1fr; }
      .btn-analyze { grid-column: 1; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>⚖ RuleAdapt</h1>
    <span>助成金対応型・就業規則自動アジャストツール</span>
  </div>
</header>

<div class="container">

  <!-- API設定 -->
  <div class="card full-width">
    <h2>🔑 Gemini API設定</h2>
    <label for="api_key">Google Gemini APIキー</label>
    <input type="password" id="api_key" placeholder="AIza...">
    <p style="font-size:0.78rem; color:#888; margin-top:6px;">
      キーはサーバーに保存されません。解析ごとに送信されます。
    </p>
  </div>

  <!-- 就業規則アップロード -->
  <div class="card">
    <h2>📄 就業規則・賃金規定</h2>
    <div class="file-drop" id="file-drop" onclick="document.getElementById('rule_file').click()">
      <div class="icon">📁</div>
      <div>クリックまたはドロップ</div>
      <div class="hint">Word(.docx) / PDF / テキスト</div>
      <input type="file" id="rule_file" accept=".docx,.doc,.pdf,.txt">
    </div>
    <div class="file-name" id="file-name"></div>

    <div class="divider">── または直接テキスト入力 ──</div>

    <label for="rule_text">就業規則テキスト（任意）</label>
    <textarea id="rule_text" placeholder="就業規則の本文をここに貼り付けることもできます..."></textarea>
  </div>

  <!-- 実態メモ -->
  <div class="card">
    <h2>📝 実態メモ</h2>
    <label for="reality_memo">現場の実態情報を入力してください</label>
    <textarea id="reality_memo" style="min-height: 200px;" placeholder="例：
・毎日15分早出して掃除している
・残業代が基本給に込みになっている
・シフト表では土曜出勤が月2回ある
・昇給は口頭で約束しているが規定なし
・パートは交通費なし、正社員はあり"></textarea>
    <p style="font-size:0.78rem; color:#888; margin-top:8px;">
      FAXや手書き書類の内容もここにメモとして入力できます。
    </p>
  </div>

  <!-- 解析ボタン -->
  <button class="btn-analyze" id="analyze-btn" onclick="analyze()">
    🔍 就業規則を解析する
  </button>

  <!-- エラー表示 -->
  <div class="error-msg full-width" id="error-msg"></div>

  <!-- ローディング -->
  <div class="loading full-width" id="loading">
    <div class="spinner"></div>
    <div>Geminiが解析中です。しばらくお待ちください...</div>
  </div>

  <!-- 結果表示 -->
  <div class="card full-width" id="result-section">
    <h2>
      📋 解析結果
      <button class="copy-btn" onclick="copyResult()">コピー</button>
    </h2>
    <div class="result-box" id="result-box"></div>
  </div>

</div>

<script>
  // ファイルドロップ
  const fileDrop = document.getElementById('file-drop');
  const fileInput = document.getElementById('rule_file');
  const fileName = document.getElementById('file-name');

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) {
      fileName.textContent = '✅ ' + fileInput.files[0].name;
    }
  });

  fileDrop.addEventListener('dragover', (e) => {
    e.preventDefault();
    fileDrop.classList.add('drag-over');
  });
  fileDrop.addEventListener('dragleave', () => fileDrop.classList.remove('drag-over'));
  fileDrop.addEventListener('drop', (e) => {
    e.preventDefault();
    fileDrop.classList.remove('drag-over');
    const dt = e.dataTransfer;
    if (dt.files[0]) {
      fileInput.files = dt.files;
      fileName.textContent = '✅ ' + dt.files[0].name;
    }
  });

  async function analyze() {
    const apiKey = document.getElementById('api_key').value.trim();
    const ruleText = document.getElementById('rule_text').value.trim();
    const realityMemo = document.getElementById('reality_memo').value.trim();
    const file = fileInput.files[0];

    if (!apiKey) {
      showError('Gemini APIキーを入力してください。');
      return;
    }
    if (!file && !ruleText) {
      showError('就業規則ファイルをアップロードするか、テキストを入力してください。');
      return;
    }

    hideError();
    showLoading(true);
    document.getElementById('result-section').classList.remove('visible');
    document.getElementById('analyze-btn').disabled = true;

    const formData = new FormData();
    formData.append('api_key', apiKey);
    formData.append('reality_memo', realityMemo);
    formData.append('rule_text', ruleText);
    if (file) formData.append('rule_file', file);

    try {
      const res = await fetch('/analyze', { method: 'POST', body: formData });
      const data = await res.json();
      if (!res.ok || data.error) {
        showError(data.error || '解析中にエラーが発生しました。');
      } else {
        showResult(data.result);
      }
    } catch (e) {
      showError('通信エラーが発生しました: ' + e.message);
    } finally {
      showLoading(false);
      document.getElementById('analyze-btn').disabled = false;
    }
  }

  function showResult(text) {
    const box = document.getElementById('result-box');
    // シンプルなMarkdown変換
    let html = text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h3>$1</h3>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/🔴/g, '<span class="status-badge badge-red">🔴 不支給リスク</span>')
      .replace(/🟡/g, '<span class="status-badge badge-yellow">🟡 要修正</span>')
      .replace(/🟢/g, '<span class="status-badge badge-green">🟢 問題なし</span>');
    box.innerHTML = html;
    document.getElementById('result-section').classList.add('visible');
    document.getElementById('result-section').scrollIntoView({ behavior: 'smooth' });
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = '⚠ ' + msg;
    el.classList.add('visible');
  }
  function hideError() {
    document.getElementById('error-msg').classList.remove('visible');
  }
  function showLoading(show) {
    document.getElementById('loading').classList.toggle('visible', show);
  }
  function copyResult() {
    const text = document.getElementById('result-box').innerText;
    navigator.clipboard.writeText(text).then(() => alert('コピーしました'));
  }
</script>

</body>
</html>
